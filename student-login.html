<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login - PAVIUM</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

    <h2>Student Login</h2>

    <form action="student-dashboard.html">

        <input
        type="email"
        placeholder="Enter Email"
        required>

        <input
        type="password"
        placeholder="Enter Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <a href="index.html" class="btn">
        ⬅ Back To Home
    </a>

</div>

</body>
</html>
